<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Orchestrator</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.15);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .header .tag {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface-2);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* Layout */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px;
    }

    /* Pipeline Selector */
    .pipeline-selector {
      margin-bottom: 32px;
    }
    .pipeline-selector h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .pipeline-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }
    .pipeline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pipeline-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .pipeline-card.selected {
      border-color: var(--accent);
      background: var(--accent-glow);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .pipeline-card .name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .pipeline-card .category {
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .pipeline-card .desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .pipeline-card .meta {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      gap: 16px;
    }

    /* Input Area */
    .input-area {
      margin-bottom: 24px;
    }
    .input-area label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .input-row {
      display: flex;
      gap: 12px;
    }
    .input-area textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 12px 16px;
      resize: vertical;
      min-height: 64px;
      max-height: 200px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus {
      border-color: var(--accent);
    }
    .input-area textarea::placeholder {
      color: var(--text-dim);
    }
    .run-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .run-btn:hover { opacity: 0.9; }
    .run-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Pipeline View (shown during/after run) */
    .pipeline-view {
      display: none;
    }
    .pipeline-view.active { display: block; }

    /* Progress Bar */
    .progress-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-header .status {
      font-size: 13px;
      flex: 1;
    }
    .progress-header .timer {
      font-size: 12px;
      color: var(--text-dim);
    }
    .progress-track {
      height: 4px;
      background: var(--surface-2);
      border-radius: 0 0 4px 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Steps */
    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
    }
    .step.active {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .step.done {
      border-color: var(--green);
      opacity: 0.7;
    }
    .step.rework {
      border-color: var(--amber);
    }
    .step-indicator {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      background: var(--surface-2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .step.active .step-indicator { border-color: var(--accent); color: var(--accent); }
    .step.done .step-indicator { border-color: var(--green); color: var(--green); }
    .step-info { flex: 1; }
    .step-label { font-size: 13px; font-weight: 600; }
    .step-agent { font-size: 11px; color: var(--text-dim); }
    .step-message {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
      font-style: italic;
    }

    /* Event Log */
    .event-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 24px;
    }
    .event-log h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .event-entry {
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 1px solid var(--surface-2);
      display: flex;
      gap: 8px;
    }
    .event-entry:last-child { border-bottom: none; }
    .event-time { color: var(--text-dim); white-space: nowrap; }
    .event-text { color: var(--text); }
    .event-entry.tool .event-text { color: var(--amber); }
    .event-entry.rework .event-text { color: var(--red); }
    .event-entry.commentary .event-text { color: var(--accent); font-style: italic; }

    /* Result */
    .result-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 24px;
    }
    .result-panel.active { display: block; }
    .result-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--green);
    }
    .result-json {
      background: var(--bg);
      border-radius: var(--radius);
      padding: 16px;
      font-size: 12px;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .result-actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
    .result-actions button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .result-actions button:hover { border-color: var(--accent); }

    /* Error */
    .error-banner {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--red);
    }
    .error-banner.active { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Agent Orchestrator</h1>
    <span class="tag">Multi-Pipeline Framework</span>
  </div>

  <div class="main">
    <!-- Pipeline Selector -->
    <div class="pipeline-selector" id="pipelineSelector">
      <h2>Select Pipeline</h2>
      <div class="pipeline-cards" id="pipelineCards"></div>
    </div>

    <!-- Input -->
    <div class="input-area" id="inputArea">
      <label id="inputLabel">Input</label>
      <div class="input-row">
        <textarea id="inputText" placeholder="Select a pipeline above..." maxlength="2000"></textarea>
        <button class="run-btn" id="runBtn" disabled>Run</button>
      </div>
    </div>

    <!-- Error -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Pipeline View -->
    <div class="pipeline-view" id="pipelineView">
      <div class="progress-header">
        <div class="status" id="statusText">Starting...</div>
        <div class="timer" id="timerText">0s</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="steps-container" id="stepsContainer"></div>

      <div class="event-log" id="eventLog">
        <h3>Event Log</h3>
      </div>
    </div>

    <!-- Result -->
    <div class="result-panel" id="resultPanel">
      <h3 id="resultTitle">Pipeline Complete</h3>
      <div class="result-json" id="resultJson"></div>
      <div class="result-actions">
        <button id="copyBtn">Copy JSON</button>
        <button id="downloadBtn" style="display:none">Download PPTX</button>
        <button id="resetBtn">Run Another</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let pipelines = [];
    let selectedPipeline = null;
    let running = false;
    let startTime = 0;
    let timerInterval = null;

    const pipelineCards = document.getElementById('pipelineCards');
    const inputLabel = document.getElementById('inputLabel');
    const inputText = document.getElementById('inputText');
    const runBtn = document.getElementById('runBtn');
    const errorBanner = document.getElementById('errorBanner');
    const pipelineView = document.getElementById('pipelineView');
    const stepsContainer = document.getElementById('stepsContainer');
    const statusText = document.getElementById('statusText');
    const timerText = document.getElementById('timerText');
    const progressFill = document.getElementById('progressFill');
    const eventLog = document.getElementById('eventLog');
    const resultPanel = document.getElementById('resultPanel');
    const resultTitle = document.getElementById('resultTitle');
    const resultJson = document.getElementById('resultJson');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    async function loadPipelines() {
      try {
        const resp = await fetch('/api/pipelines');
        pipelines = await resp.json();
        renderPipelineCards();
      } catch (e) {
        showError('Failed to load pipelines. Is the server running?');
      }
    }

    function renderPipelineCards() {
      pipelineCards.innerHTML = '';
      pipelines.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pipeline-card';
        card.dataset.id = p.id;
        const agentNames = Object.values(p.agents).map(a => a.role).join(', ');
        card.innerHTML = `
          <div class="name">${esc(p.name)}</div>
          <div class="category">${esc(p.category)}</div>
          <div class="desc">${esc(p.description)}</div>
          <div class="meta">
            <span>${p.steps.length} steps</span>
            <span>${Object.keys(p.agents).length} agents</span>
            ${p.has_review ? '<span>+ review</span>' : ''}
          </div>
        `;
        card.onclick = () => selectPipeline(p, card);
        pipelineCards.appendChild(card);
      });
    }

    function selectPipeline(p, card) {
      selectedPipeline = p;
      document.querySelectorAll('.pipeline-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      inputLabel.textContent = p.input.label;
      inputText.placeholder = p.input.placeholder;
      inputText.maxLength = p.input.max_length;
      runBtn.disabled = false;
      errorBanner.classList.remove('active');
    }

    runBtn.onclick = () => {
      if (!selectedPipeline || running) return;
      const input = inputText.value.trim();
      if (!input) { showError('Please enter some input.'); return; }
      startRun(input);
    };

    inputText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runBtn.click(); }
    });

    function startRun(input) {
      running = true;
      runBtn.disabled = true;
      errorBanner.classList.remove('active');
      resultPanel.classList.remove('active');
      pipelineView.classList.add('active');

      stepsContainer.innerHTML = '';
      selectedPipeline.steps.forEach((s, i) => {
        const step = document.createElement('div');
        step.className = 'step';
        step.id = `step-${s.id}`;
        step.innerHTML = `
          <div class="step-indicator">${i + 1}</div>
          <div class="step-info">
            <div class="step-label">${esc(s.label)}</div>
            <div class="step-agent">${esc(selectedPipeline.agents[s.agent]?.role || s.agent)}</div>
            <div class="step-message" id="msg-${s.id}"></div>
          </div>
        `;
        stepsContainer.appendChild(step);
      });

      startTime = Date.now();
      timerInterval = setInterval(() => {
        timerText.textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
      }, 1000);

      eventLog.innerHTML = '<h3>Event Log</h3>';

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onopen = () => {
        ws.send(JSON.stringify({
          type: 'run',
          pipeline: selectedPipeline.id,
          input: input,
          brief: input,
        }));
      };
      ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
      ws.onerror = () => showError('WebSocket connection failed.');
      ws.onclose = () => { if (running) { running = false; clearInterval(timerInterval); } };
    }

    function handleEvent(ev) {
      switch (ev.type) {
        case 'pipeline_start':
          statusText.textContent = 'Pipeline started...';
          logEntry('Pipeline started');
          break;
        case 'agent_start':
          statusText.textContent = ev.message || `${ev.agent} starting...`;
          if (ev.step && ev.total_steps) progressFill.style.width = ((ev.step - 1) / ev.total_steps * 100) + '%';
          activateStep(ev.agent, ev.message);
          logEntry(ev.message || `${ev.agent} started`);
          break;
        case 'agent_done':
          markDone(ev.agent);
          logEntry(ev.message || `${ev.agent} done`);
          break;
        case 'tool_call':
          logEntry(`${ev.agent}: ${ev.message || ev.tool}`, 'tool');
          break;
        case 'rework':
          statusText.textContent = `Rework: ${ev.target}`;
          logEntry(`Rework: ${ev.message || ev.target}`, 'rework');
          markRework(ev.target);
          break;
        case 'commentary':
        case 'outro':
          if (ev.text) logEntry(ev.text, 'commentary');
          break;
        case 'status':
          statusText.textContent = ev.message || 'Processing...';
          if (ev.step && ev.total_steps) progressFill.style.width = ((ev.step - 1) / ev.total_steps * 100) + '%';
          logEntry(ev.message || 'Status update');
          break;
        case 'pipeline_complete': {
          running = false;
          clearInterval(timerInterval);
          progressFill.style.width = '100%';
          statusText.textContent = 'Complete!';
          const output = ev.output || ev.pitch_deck;
          resultTitle.textContent = `${selectedPipeline.name} \u2014 Complete`;
          resultJson.textContent = JSON.stringify(output, null, 2);
          resultPanel.classList.add('active');
          downloadBtn.style.display = ev.download_url ? '' : 'none';
          if (ev.download_url) downloadBtn.onclick = () => window.open(ev.download_url);
          logEntry('Pipeline complete');
          break;
        }
        case 'pipeline_error':
          running = false;
          clearInterval(timerInterval);
          showError(ev.error || 'Pipeline failed.');
          logEntry(`Error: ${ev.error}`, 'rework');
          break;
        case 'error':
          showError(ev.message || 'An error occurred.');
          break;
      }
    }

    function activateStep(agent, message) {
      for (const s of selectedPipeline.steps) {
        if (s.agent === agent) {
          const el = document.getElementById(`step-${s.id}`);
          if (el) { el.classList.add('active'); el.classList.remove('done'); }
          const msg = document.getElementById(`msg-${s.id}`);
          if (msg && message) msg.textContent = message;
          return;
        }
      }
    }

    function markDone(agent) {
      for (const s of selectedPipeline.steps) {
        if (s.agent === agent) {
          const el = document.getElementById(`step-${s.id}`);
          if (el) { el.classList.remove('active'); el.classList.add('done'); }
          return;
        }
      }
    }

    function markRework(target) {
      for (const s of selectedPipeline.steps) {
        if (s.agent === target) {
          const el = document.getElementById(`step-${s.id}`);
          if (el) { el.classList.remove('done'); el.classList.add('rework'); }
        }
      }
    }

    function logEntry(text, type = '') {
      const entry = document.createElement('div');
      entry.className = `event-entry ${type}`;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      entry.innerHTML = `<span class="event-time">${elapsed}s</span><span class="event-text">${esc(text)}</span>`;
      eventLog.appendChild(entry);
      eventLog.scrollTop = eventLog.scrollHeight;
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.add('active');
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(resultJson.textContent);
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy JSON', 1500);
    };

    resetBtn.onclick = () => {
      pipelineView.classList.remove('active');
      resultPanel.classList.remove('active');
      errorBanner.classList.remove('active');
      progressFill.style.width = '0%';
      statusText.textContent = 'Starting...';
      runBtn.disabled = !selectedPipeline;
      inputText.value = '';
      if (ws) { ws.close(); ws = null; }
    };

    loadPipelines();
  </script>
</body>
</html>
