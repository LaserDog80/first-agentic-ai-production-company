<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Agentic Production Company</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1a2e;
            --bg-mid: #16213e;
            --bg-light: #0f3460;
            --accent: #e94560;
            --gold: #f5c542;
            --green: #4ecca3;
            --text: #eaeaea;
            --text-dim: #8892b0;
            --pixel-size: 4px;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 24px 16px 12px;
            background: linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-dark) 100%);
            border-bottom: 4px solid var(--accent);
        }

        .header h1 {
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 8px;
            color: var(--text-dim);
        }

        /* ── INPUT AREA ── */
        .input-area {
            display: flex;
            justify-content: center;
            padding: 20px 16px;
            gap: 8px;
        }

        .input-area input {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 12px 16px;
            background: var(--bg-mid);
            border: 3px solid var(--bg-light);
            color: var(--text);
            width: 100%;
            max-width: 560px;
            outline: none;
            image-rendering: pixelated;
        }

        .input-area input:focus {
            border-color: var(--gold);
        }

        .input-area input::placeholder {
            color: var(--text-dim);
            font-size: 8px;
        }

        .input-area button {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 12px 20px;
            background: var(--accent);
            border: none;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .input-area button:hover {
            background: #ff5a75;
        }

        .input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* ── STAGE ── */
        .stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 20px 20px 0;
            gap: 16px;
            min-height: 420px;
            position: relative;
        }

        /* Ground */
        .stage::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: repeating-linear-gradient(
                90deg,
                #2d5016 0px, #2d5016 16px,
                #3a6b1e 16px, #3a6b1e 32px
            );
            border-top: 4px solid #4a8c2a;
            image-rendering: pixelated;
        }

        /* ── CHARACTER SLOT ── */
        .character-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 160px;
            min-height: 350px;
            justify-content: flex-end;
            padding-bottom: 52px;
        }

        /* ── SPEECH BUBBLE ── */
        .speech-bubble {
            position: relative;
            background: #fff;
            color: #222;
            font-size: 7px;
            line-height: 1.6;
            padding: 10px 12px;
            border: 3px solid #222;
            max-width: 150px;
            min-height: 40px;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s, transform 0.3s;
            word-break: break-word;
        }

        .speech-bubble.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #222;
        }

        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 9px solid #fff;
            z-index: 1;
        }

        .bubble-label {
            font-size: 6px;
            color: #888;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .bubble-text {
            color: #333;
        }

        /* ── PIXEL CHARACTER ── */
        .pixel-character {
            width: 64px;
            height: 80px;
            image-rendering: pixelated;
            position: relative;
            transition: transform 0.2s;
        }

        .character-slot.active .pixel-character {
            animation: bounce 0.6s ease-in-out infinite;
        }

        .character-slot.done .pixel-character {
            filter: drop-shadow(0 0 6px var(--green));
        }

        .character-slot.rework .pixel-character {
            animation: shake 0.3s ease-in-out;
            filter: drop-shadow(0 0 6px var(--accent));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* ── PIXEL ART CHARACTERS (CSS pixel art) ── */
        .pixel-art {
            display: grid;
            width: 64px;
            height: 80px;
        }

        .pixel-art canvas {
            width: 64px;
            height: 80px;
            image-rendering: pixelated;
        }

        /* ── CHARACTER NAME ── */
        .char-name {
            font-size: 7px;
            color: var(--text);
            text-align: center;
            margin-top: 6px;
            text-shadow: 1px 1px 0 #000;
            position: relative;
            z-index: 2;
        }

        .char-role {
            font-size: 6px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 3px;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            background: var(--bg-mid);
            border-top: 4px solid var(--bg-light);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            min-height: 56px;
        }

        .progress-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-text {
            font-size: 8px;
            color: var(--text);
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: var(--bg-dark);
            border: 2px solid var(--bg-light);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--green);
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-fill.error {
            background: var(--accent);
        }

        .step-counter {
            font-size: 8px;
            color: var(--gold);
            white-space: nowrap;
        }

        /* ── LOG PANEL ── */
        .log-panel {
            background: var(--bg-dark);
            border-top: 2px solid var(--bg-mid);
            padding: 8px 20px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 7px;
            line-height: 2;
        }

        .log-entry {
            color: var(--text-dim);
        }

        .log-entry .timestamp {
            color: var(--bg-light);
            margin-right: 8px;
        }

        .log-entry.event-agent_start { color: var(--gold); }
        .log-entry.event-agent_done { color: var(--green); }
        .log-entry.event-rework { color: var(--accent); }
        .log-entry.event-tool_call { color: #7ec8e3; }

        /* ── RESULT OVERLAY ── */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .result-overlay.visible {
            display: block;
        }

        .result-content {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-mid);
            border: 4px solid var(--gold);
            padding: 24px;
        }

        .result-content h2 {
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 16px;
            text-align: center;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .btn-download {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 14px 28px;
            background: var(--green);
            border: none;
            color: #000;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.15s;
        }

        .btn-download:hover {
            background: #6fe8c0;
        }

        /* ── RESULT TABS ── */
        .result-tabs {
            display: flex;
            border-bottom: 3px solid var(--bg-light);
            margin-bottom: 16px;
            gap: 0;
        }

        .result-tab {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 10px 16px;
            background: var(--bg-dark);
            border: 2px solid var(--bg-light);
            border-bottom: none;
            color: var(--text-dim);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            margin-right: -2px;
            position: relative;
            bottom: -3px;
        }

        .result-tab:hover {
            color: var(--text);
            background: var(--bg-mid);
        }

        .result-tab.active {
            color: var(--gold);
            background: var(--bg-mid);
            border-color: var(--gold);
            border-bottom: 3px solid var(--bg-mid);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.visible {
            display: block;
        }

        /* ── PITCH DECK SECTIONS ── */
        .deck-section {
            margin-bottom: 16px;
            border: 2px solid var(--bg-light);
            padding: 12px;
        }

        .deck-section h3 {
            font-size: 8px;
            color: var(--gold);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .deck-section p, .deck-section li {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            line-height: 2;
            color: var(--text);
        }

        .deck-section ul {
            list-style: none;
            padding-left: 0;
        }

        .deck-section li::before {
            content: '> ';
            color: var(--accent);
        }

        .deck-label {
            font-size: 6px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .deck-value {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            line-height: 2;
            color: var(--text);
            margin-bottom: 8px;
        }

        .deck-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 6px;
        }

        .deck-table th, .deck-table td {
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            line-height: 2;
            padding: 4px 6px;
            text-align: left;
            border-bottom: 1px solid var(--bg-light);
        }

        .deck-table th {
            color: var(--gold);
            text-transform: uppercase;
        }

        .deck-table td {
            color: var(--text);
        }

        .feasibility-badge {
            display: inline-block;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 4px 12px;
            border: 2px solid;
            text-transform: uppercase;
        }

        .feasibility-badge.green { color: var(--green); border-color: var(--green); }
        .feasibility-badge.amber { color: var(--gold); border-color: var(--gold); }
        .feasibility-badge.red { color: var(--accent); border-color: var(--accent); }

        /* ── EVIDENCE TRAIL ── */
        .evidence-narrative {
            font-family: 'Press Start 2P', monospace;
            font-size: 7px;
            line-height: 2.4;
            color: var(--text);
        }

        .evidence-intro {
            color: var(--text);
            margin-bottom: 16px;
            padding: 10px 12px;
            border: 2px solid var(--bg-light);
            background: var(--bg-dark);
        }

        .evidence-chapter {
            margin-bottom: 14px;
            padding-left: 12px;
            border-left: 3px solid var(--bg-light);
        }

        .evidence-chapter.has-tools {
            border-left-color: #7ec8e3;
        }

        .evidence-chapter.has-rework {
            border-left-color: var(--accent);
        }

        .evidence-who {
            color: var(--gold);
            margin-bottom: 2px;
        }

        .evidence-what {
            color: var(--text);
        }

        .evidence-tools {
            color: #7ec8e3;
            font-style: italic;
        }

        .evidence-time {
            color: var(--text-dim);
            font-size: 6px;
        }

        .evidence-footer {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid var(--bg-light);
            color: var(--text-dim);
            font-size: 7px;
        }

        .evidence-rework-note {
            color: var(--accent);
            margin-top: 8px;
            padding: 8px 12px;
            border: 2px solid var(--accent);
            background: rgba(233,69,96,0.1);
        }

        .result-close {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px 24px;
            background: var(--accent);
            border: none;
            color: #fff;
            cursor: pointer;
            display: block;
            margin: 16px auto 0;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .stage {
                gap: 8px;
                padding: 12px 8px 0;
            }
            .character-slot { width: 120px; }
            .speech-bubble { max-width: 110px; font-size: 6px; }
        }

        @media (max-width: 640px) {
            .stage {
                flex-wrap: wrap;
                justify-content: center;
                min-height: auto;
            }
            .character-slot { width: 100px; min-height: 250px; }
        }
    </style>
</head>

    <div class="header">

        <p>AI agents collaborate to turn your idea into a pitch deck</p>
    </div>

    <div class="input-area">
        <input type="text" id="briefInput"
               placeholder="Enter a show idea... e.g. A 3x60 doc about lighthouse keepers"

        <button id="runBtn" onclick="startPipeline()">GO!</button>
    </div>

    <div class="stage" id="stage">
        <!-- Characters generated by JS -->
    </div>

    <div class="status-bar">
        <div class="progress-container">
            <div class="progress-text" id="statusText">Ready. Enter a brief to begin.</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="step-counter" id="stepCounter">-/-</div>
    </div>

    <div class="log-panel" id="logPanel"></div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-content">
            <h2>PITCH DECK COMPLETE</h2>
            <div class="result-actions" id="resultActions"></div>
            <div class="result-tabs" id="resultTabs">
                <button class="result-tab active" onclick="switchTab('deck')">PITCH DECK</button>
                <button class="result-tab" onclick="switchTab('evidence')">EVIDENCE TRAIL</button>
                <button class="result-tab" onclick="switchTab('json')">RAW JSON</button>

            <div class="tab-panel visible" id="tabDeck"></div>
            <div class="tab-panel" id="tabEvidence"></div>
            <div class="tab-panel" id="tabJson"></div>
            <button class="result-close" onclick="closeResult()">CLOSE</button>
        </div>
    </div>

    // ── STATE ──
    let ws = null;
    let isRunning = false;

    // ── INIT ──
    function init() {
        const stage = document.getElementById('stage');
        CHARACTERS.forEach(char => {
            const slot = document.createElement('div');
            slot.className = 'character-slot';
            slot.id = `slot-${char.id}`;
            slot.innerHTML = `
                <div class="speech-bubble" id="bubble-${char.id}">
                    <div class="bubble-label"></div>
                    <div class="bubble-text">Waiting...</div>
                </div>
                <div class="pixel-character">
                    <canvas id="canvas-${char.id}" width="64" height="80"></canvas>
                </div>
                <div class="char-name">${char.name}</div>
                <div class="char-role">${char.role}</div>
            `;
            stage.appendChild(slot);
            drawCharacter(char);
        });

        document.getElementById('briefInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startPipeline();
        });
    }

    function drawCharacter(char) {
        const canvas = document.getElementById(`canvas-${char.id}`);
        const ctx = canvas.getContext('2d');
        const scale = 6;

        // Offset to center the 8-wide character in the 64px canvas
        const offsetX = 8;
        const offsetY = 12;

        char.pixels.forEach(group => {
            ctx.fillStyle = group.color;
            group.coords.forEach(([x, y]) => {
                ctx.fillRect(
                    offsetX + x * scale,
                    offsetY + y * scale,
                    scale,
                    scale
                );
            });
        });
    }

    // ── PIPELINE ──
    function startPipeline() {
        const input = document.getElementById('briefInput');
        const brief = input.value.trim();
        if (!brief || isRunning) return;

        isRunning = true;
        document.getElementById('runBtn').disabled = true;
        resetUI();

        // Connect WebSocket
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'run', brief }));
            setStatus('Pipeline starting...', 0);
            addLog('pipeline_start', `Brief: "${brief}"`);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleEvent(data);
        };

        ws.onclose = () => {
            if (isRunning) {
                setStatus('Connection lost.', 0, true);
                isRunning = false;
                document.getElementById('runBtn').disabled = false;
            }
        };

        ws.onerror = () => {
            setStatus('Connection error.', 0, true);
            isRunning = false;
            document.getElementById('runBtn').disabled = false;
        };
    }

    function handleEvent(event) {
        switch (event.type) {
            case 'pipeline_start':
                setStatus('Pipeline started!', 0);
                break;

            case 'agent_start':
                setCharacterState(event.agent, 'active');
                setBubble(event.agent, event.phase || '', event.message);
                setStatus(event.message, ((event.step - 1) / event.total_steps) * 100);
                setStep(event.step, event.total_steps);
                addLog('agent_start', `${agentLabel(event.agent)} started: ${event.message}`);
                break;

            case 'agent_done':
                setCharacterState(event.agent, 'done');
                setBubble(event.agent, 'Done', event.message);
                addLog('agent_done', `${agentLabel(event.agent)} finished: ${event.message}`);
                break;

            case 'tool_call':
                setBubble(event.agent, event.tool, formatToolArgs(event));
                addLog('tool_call', `${agentLabel(event.agent)} using ${event.tool}`);
                break;

            case 'rework':
                setCharacterState(event.target, 'rework');
                setBubble('series_producer', 'Rework!', event.message);
                setStatus(`Rework cycle ${event.cycle}: ${event.notes}`, null);
                addLog('rework', event.message);
                // After a brief delay, reset the target to active
                setTimeout(() => setCharacterState(event.target, 'active'), 600);
                break;

            case 'status':
                setStatus(event.message, ((event.step - 1) / event.total_steps) * 100);
                setStep(event.step, event.total_steps);
                addLog('status', event.message);
                break;

            case 'pipeline_complete':
                setStatus('Pitch deck complete!', 100);
                setStep(9, 9);
                addLog('agent_done', 'Pipeline complete!');
                showResult(event.pitch_deck, event.download_url, event.evidence);
                isRunning = false;
                document.getElementById('runBtn').disabled = false;
                if (ws) ws.close();
                break;

            case 'pipeline_error':
                setStatus(`Error: ${event.error}`, null, true);
                addLog('rework', `Pipeline error: ${event.error}`);
                isRunning = false;
                document.getElementById('runBtn').disabled = false;
                if (ws) ws.close();
                break;

            case 'error':
                setStatus(event.message, null, true);
                break;
        }
    }

    // ── UI HELPERS ──
    function resetUI() {
        CHARACTERS.forEach(char => {
            setCharacterState(char.id, '');
            const bubble = document.getElementById(`bubble-${char.id}`);
            bubble.classList.remove('visible');
        });
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressFill').classList.remove('error');
        document.getElementById('stepCounter').textContent = '-/-';
        document.getElementById('logPanel').innerHTML = '';
        document.getElementById('resultOverlay').classList.remove('visible');
    }

    function setCharacterState(agentId, state) {
        const slot = document.getElementById(`slot-${agentId}`);
        if (!slot) return;
        slot.className = 'character-slot';
        if (state) slot.classList.add(state);
    }

    function setBubble(agentId, label, text) {
        const bubble = document.getElementById(`bubble-${agentId}`);
        if (!bubble) return;
        bubble.querySelector('.bubble-label').textContent = label;
        bubble.querySelector('.bubble-text').textContent = text;
        bubble.classList.add('visible');
    }

    function setStatus(text, percent, isError) {
        document.getElementById('statusText').textContent = text;
        if (percent !== null && percent !== undefined) {
            const fill = document.getElementById('progressFill');
            fill.style.width = percent + '%';
            if (isError) fill.classList.add('error');
        }
    }

    function setStep(current, total) {
        document.getElementById('stepCounter').textContent = `${current}/${total}`;
    }

    function addLog(type, message) {
        const panel = document.getElementById('logPanel');
        const now = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = `log-entry event-${type}`;
        entry.innerHTML = `<span class="timestamp">[${now}]</span>${message}`;
        panel.appendChild(entry);
        panel.scrollTop = panel.scrollHeight;
    }

    function agentLabel(id) {
        const char = CHARACTERS.find(c => c.id === id);
        return char ? char.name : id;
    }

    function formatToolArgs(event) {
        if (event.tool === 'web_search' && event.args?.query) {
            return `Searching: "${event.args.query}"`;
        }
        if (event.tool === 'lookup_rates') {
            return `Looking up rates for ${event.args?.role || 'crew'}`;
        }
        if (event.tool === 'reference_research') {
            return `Referencing: ${event.args?.section || 'research'}`;
        }
        if (event.tool === 'flag_gap') {
            return `Flagging: ${event.args?.description || 'gap'}`;
        }
        return event.message || 'Working...';
    }

    function showResult(pitchDeck, downloadUrl, evidence) {
        const overlay = document.getElementById('resultOverlay');
        const actions = document.getElementById('resultActions');

        window._lastPitchDeck = pitchDeck;

        // -- Download button --
        actions.innerHTML = downloadUrl
            ? `<a class="btn-download" href="${downloadUrl}" download="pitch_deck.pptx">DOWNLOAD PPTX</a>`
            : '';

        // -- Populate tab panels --
        document.getElementById('tabDeck').innerHTML = renderDeck(pitchDeck);
        document.getElementById('tabEvidence').innerHTML = renderEvidence(evidence);
        document.getElementById('tabJson').innerHTML = `<pre style="font-family:'Press Start 2P',monospace;font-size:7px;line-height:2;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:60vh;overflow-y:auto">${esc(JSON.stringify(pitchDeck, null, 2))}</pre>`;

        // -- Reset to first tab --
        switchTab('deck');

        overlay.classList.add('visible');
    }

    function switchTab(tabName) {
        const tabs = document.querySelectorAll('.result-tab');
        const panels = { deck: 'tabDeck', evidence: 'tabEvidence', json: 'tabJson' };

        tabs.forEach(t => t.classList.remove('active'));
        Object.values(panels).forEach(id => document.getElementById(id).classList.remove('visible'));

        document.getElementById(panels[tabName]).classList.add('visible');
        // Activate the matching tab button
        const tabIndex = { deck: 0, evidence: 1, json: 2 };
        tabs[tabIndex[tabName]].classList.add('active');
    }

    function renderDeck(deck) {
        if (!deck) return '<p style="color:var(--accent)">No pitch deck data returned.</p>';

        catch (e) {
            console.error('renderDeck error:', e);
            return `<p style="color:var(--accent)">Error rendering deck: ${esc(e.message)}</p><pre style="font-family:'Press Start 2P',monospace;font-size:7px;line-height:2;color:var(--text);white-space:pre-wrap;word-break:break-word">${esc(JSON.stringify(deck, null, 2))}</pre>`;
        }
    }

    const AGENT_NAMES = {
        series_producer: 'The Series Producer',
        producer: 'The Producer',
        researcher: 'The Researcher',
        director: 'The Director',
        production_manager: 'The Production Manager',
        evidence_generator: 'The Evidence Generator',
    };

    const PHASE_VERBS = {
        phase_a: 'read the brief and shaped the editorial vision',
        briefing: 'broke the vision down into specialist assignments',
        research: 'went out into the world to gather facts',
        treatment: 'crafted the creative treatment and narrative arc',
        feasibility: 'ran the numbers on budget, crew, and logistics',
        collation: 'pulled everything together into an episode package',
        phase_b: 'reviewed the full package and made the final call',
        evidence: 'compiled the evidence trail',
    };

    function renderEvidence(evidence) {
        if (!evidence) return '<p style="color:var(--text-dim);font-size:7px">No evidence trail available for this run.</p>';

        let html = '<div class="evidence-narrative">';

        // Intro
        if (evidence.pipeline_summary) {
            html += `<div class="evidence-intro">${esc(evidence.pipeline_summary)}</div>`;
        }

        // Story steps
        if (evidence.steps && evidence.steps.length) {
            evidence.steps.forEach((step) => {
                const who = AGENT_NAMES[step.agent_name] || step.agent_name;
                const verb = PHASE_VERBS[step.phase] || step.phase;
                const hasTools = step.tools_used && step.tools_used.length > 0;
                const cls = hasTools ? 'evidence-chapter has-tools' : 'evidence-chapter';
                const secs = (step.duration_ms / 1000).toFixed(1);

                html += `<div class="${cls}">`;
                html += `<div class="evidence-who">${esc(who)}</div>`;
                html += `<div class="evidence-what">${esc(who)} ${esc(verb)}.</div>`;

                if (step.what_received) {
                    html += `<div class="evidence-what">Starting from: ${esc(step.what_received)}</div>`;
                }
                if (step.what_produced) {
                    html += `<div class="evidence-what">They delivered: ${esc(step.what_produced)}</div>`;
                }
                if (hasTools) {
                    const toolStr = step.tools_used.length === 1
                        ? `using ${esc(step.tools_used[0])}`
                        : `using ${step.tools_used.slice(0, -1).map(esc).join(', ')} and ${esc(step.tools_used[step.tools_used.length - 1])}`;
                    html += `<div class="evidence-tools">${toolStr}</div>`;
                }
                html += `<div class="evidence-time">${secs}s</div>`;
                html += `</div>`;
            });
        }

        // Rework details
        if (evidence.rework_count > 0 && evidence.rework_details && evidence.rework_details.length) {
            html += `<div class="evidence-rework-note">`;
            html += `The Series Producer sent work back ${evidence.rework_count} time${evidence.rework_count > 1 ? 's' : ''}:`;
            evidence.rework_details.forEach(d => {
                html += `<br>&gt; ${esc(d)}`;
            });
            html += `</div>`;
        }

        // Footer
        if (evidence.total_duration_ms) {
            const totalSecs = (evidence.total_duration_ms / 1000).toFixed(1);
            const mins = Math.floor(totalSecs / 60);
            const remSecs = (totalSecs % 60).toFixed(0);
            const timeStr = mins > 0 ? `${mins}m ${remSecs}s` : `${totalSecs}s`;
            html += `<div class="evidence-footer">The entire pipeline took ${timeStr} from brief to pitch deck.</div>`;
        }

        html += '</div>';
        return html;
    }

    function esc(str) {
        if (str == null) return '';
        const div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
    }
