<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Playground · Choose Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #1a1a2e;
    --bg-mid:  #16213e;
    --bg-light:#0f3460;
    --accent:  #e94560;
    --gold:    #f5c542;
    --green:   #4ecca3;
    --text:    #eaeaea;
    --text-dim:#8892b0;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }

  h1 {
    font-size: 16px; color: var(--gold);
    letter-spacing: 2px; text-shadow: 3px 3px 0 #000;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 9px; color: var(--text-dim);
    margin-bottom: 48px; letter-spacing: 1px;
  }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, minmax(240px, 320px));
    gap: 24px;
  }

  a.card {
    display: block;
    padding: 28px 24px;
    background: linear-gradient(180deg, var(--bg-mid), var(--bg-dark));
    border: 3px solid var(--bg-light);
    color: var(--text);
    text-decoration: none;
    text-align: center;
    transition: transform 80ms linear, border-color 120ms linear;
  }
  a.card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  a.card .label {
    font-size: 14px; color: var(--gold);
    letter-spacing: 2px; text-shadow: 2px 2px 0 #000;
    margin-bottom: 14px;
  }
  a.card .desc {
    font-size: 8px; color: var(--text-dim);
    line-height: 1.7; letter-spacing: 0.5px;
  }

  footer {
    margin-top: 56px;
    font-size: 7px; color: var(--text-dim);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <h1>AGENTIC PLAYGROUND</h1>
  <div class="subtitle">choose your mode</div>

  <div class="choices">
    <a class="card" href="/playground">
      <div class="label">▣ PLAYGROUND</div>
      <div class="desc">
        Node-based graph editor. Load a preset, edit the graph, run it,
        and inspect the output.
      </div>
    </a>
    <a class="card" href="/present">
      <div class="label">▶ PRESENT</div>
      <div class="desc">
        Cinematic view of the pitch-deck pipeline — pixel-art characters
        animate as each agent works.
      </div>
    </a>
  </div>

  <footer>v3 — one engine, two views</footer>
</body>
</html>
