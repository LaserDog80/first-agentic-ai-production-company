    api_key_env: "NEBIUS_API_KEY"
    models:
      strong: "Qwen/Qwen3-235B-A22B-Instruct-2507"
      research: "deepseek-ai/DeepSeek-V3-0324"
      utility: "Qwen/Qwen3-30B-A3B-Instruct-2507"

agents:
  series_producer:
    model_tier: "strong"
    max_iterations: 5
  producer:
    model_tier: "strong"
    max_iterations: 5
  researcher:
    model_tier: "research"
    max_iterations: 5
  director:
    model_tier: "strong"
    max_iterations: 5
  production_manager:
    model_tier: "strong"
    max_iterations: 5
