providers:
  primary:
    base_url: "https://api.tokenfactory.nebius.com/v1"
    api_key_env: "NEBIUS_API_KEY"
    models:
      strong: "Qwen/Qwen3-235B-A22B-Instruct-2507"
      research: "deepseek-ai/DeepSeek-V3-0324"
      utility: "Qwen/Qwen3-30B-A3B-Instruct-2507"

pipeline:
  agent_timeout_seconds: 300

rate_limiting:
  hourly_limit: 10    # Max pipeline runs per hour (global, all users)
  daily_limit: 50     # Max pipeline runs per day (global, all users)

tools:
  search_provider: "auto"  # auto | tavily | linkup
  tavily:
    api_key_env: "TAVILY_API_KEY"
    search_depth: "advanced"
  linkup:
    api_key_env: "LINKUP_API_KEY"
    search_depth: "standard"
