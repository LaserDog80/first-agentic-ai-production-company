providers:
  primary:
    base_url: "https://api.tokenfactory.nebius.com/v1"
    api_key_env: "NEBIUS_API_KEY"
    models:
      strong: "Qwen/Qwen3-235B-A22B-Instruct-2507"
      # Research tier needs reliable OpenAI-format tool calling. DeepSeek
      # V3-0324 was removed from Nebius, and DeepSeek-V3.2 non-deterministically
      # emits its proprietary DSML <｜DSML｜functioncall> markup as text content
      # instead of using the structured tool_calls field — so web_search calls
      # fail mid-run. Qwen handles the OpenAI tool format correctly.
      research: "Qwen/Qwen3-235B-A22B-Instruct-2507"
      utility: "Qwen/Qwen3-30B-A3B-Instruct-2507"

pipeline:
  # Per-LLM-call timeout (seconds). Without this a hung provider call
  # holds its worker thread forever.
  agent_timeout_seconds: 300
  # Default completion-tokens budget per LLM call across every graph node.
  # Researcher's ResearchPack output is ~3KB of JSON; without an explicit
  # cap, providers can default to 2-4K tokens and truncate to an empty
  # final message — which then poisons every downstream agent.
  agent_max_tokens: 8192

# Server-side guardrails for client-supplied graphs. Graphs run with the
# server's API keys, so size and iteration budgets are enforced both at
# validation time and (defensively) at execution time.
limits:
  max_nodes: 40
  max_agent_nodes: 12
  max_iterations_per_node: 15
  # Tool results longer than this are truncated before entering the
  # model's message history (full result still reaches the UI/log).
  tool_result_max_chars: 8000

# Approximate USD per 1M tokens, used only for the run cost meter.
# EDIT THESE to match your provider's current price list — they are
# estimates, not billing data. Remove the block to hide the meter.
pricing:
  strong:   { prompt: 0.20, completion: 0.60 }
  research: { prompt: 0.20, completion: 0.60 }
  utility:  { prompt: 0.10, completion: 0.30 }

rate_limiting:
  hourly_limit: 10    # Max pipeline runs per hour (global, all users)
  daily_limit: 50     # Max pipeline runs per day (global, all users)

tools:
  # auto: try Linkup first, fall back to Tavily. Or force one: tavily | linkup
  search_provider: "auto"
  linkup:
    api_key_env: "LINKUP_API_KEY"
    search_depth: "standard"
  tavily:
    api_key_env: "TAVILY_API_KEY"
    search_depth: "advanced"
